services:
  # ── Spring Boot API ──────────────────────────────────────────────
  - type: web
    name: collegeportal-api
    runtime: java
    rootDir: api/collegeportal
    buildCommand: ./mvnw -q clean package -DskipTests
    startCommand: java -jar target/demo-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # ── React / Vite Frontend ────────────────────────────────────────
  - type: web
    name: collegeportal-web
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # set to your backend URL, e.g. https://collegeportal-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
