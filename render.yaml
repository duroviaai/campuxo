services:
  # ── Spring Boot API ──────────────────────────────────────────────
  - type: web
    name: collegeportal-api
    runtime: docker
    rootDir: api/collegeportal
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        sync: false          # set manually in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to your frontend URL, e.g. https://collegeportal-web.onrender.com

  # ── React / Vite Frontend ────────────────────────────────────────
  - type: web
    name: collegeportal-web
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # set to your backend URL, e.g. https://collegeportal-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
